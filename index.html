<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styling/index.css">
</head>

<body>

    <div id="loader">
        <canvas id="loader-canvas"></canvas>
        <div class="loader-aurora">
            <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="lf1">
                        <feGaussianBlur stdDeviation="58" />
                    </filter>
                    <filter id="lf2">
                        <feGaussianBlur stdDeviation="72" />
                    </filter>
                    <filter id="lf3">
                        <feGaussianBlur stdDeviation="62" />
                    </filter>
                </defs>
            </svg>
        </div>
        <div class="loader-bottom-glow"></div>
    </div>

    <div id="player">
        <video id="v" playsinline></video>

        <div id="vignette"></div>

        <div id="title-bar"><span id="title-text"></span></div>

        <div id="tap-left" class="tap-zone"></div>
        <div id="tap-right" class="tap-zone"></div>

        <div id="skip-left" class="skip-pill">
            <div class="skip-inner">
                <i class="fa-solid fa-backward"></i>
                <span id="skip-left-lbl">-10 seconds</span>
            </div>
        </div>
        <div id="skip-right" class="skip-pill">
            <div class="skip-inner">
                <i class="fa-solid fa-forward"></i>
                <span id="skip-right-lbl">+10 seconds</span>
            </div>
        </div>

        <div id="center-flash"><i class="fa-solid fa-play" id="ci"></i></div>

        <div id="player-controls-wrapper">
            <div id="progress-container">
                <div id="track-wrap">
                    <div id="tooltip">0:00</div>
                    <div id="track">
                        <div id="buf"></div>
                        <div id="prog"></div>
                        <div id="thumb"></div>
                    </div>
                </div>
                <div id="time-row">
                    <span id="t-cur">0:00</span>
                    <span id="t-dur">0:00</span>
                </div>
            </div>

            <div id="controls">
                <div id="control-row">
                    <button id="btn-play" class="ctrl-btn"><i class="fa-solid fa-play" id="play-ico"></i></button>
                    <div style="flex:1;"></div>
                    <div id="speed-btn-wrap">
                        <button id="btn-speed" class="ctrl-btn" title="Playback speed"><i
                                class="fa-solid fa-gauge-high"></i></button>
                        <div id="speed-menu">
                            <button class="speed-opt" data-speed="0.5">0.5×</button>
                            <button class="speed-opt" data-speed="0.75">0.75×</button>
                            <button class="speed-opt active" data-speed="1">1×</button>
                            <button class="speed-opt" data-speed="1.25">1.25×</button>
                            <button class="speed-opt" data-speed="1.5">1.5×</button>
                            <button class="speed-opt" data-speed="2">2×</button>
                        </div>
                    </div>
                    <button id="btn-pip" class="ctrl-btn"><i class="fa-solid fa-window-restore"></i></button>
                    <button id="btn-fullscreen" class="ctrl-btn"><i class="fa-solid fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div id="error-screen">
            <div class="err-text">Source Not Found</div>
        </div>
    </div>

    <div id="now-playing-toast"></div>

    <script src="javascript/index.js"></script>
</body>
