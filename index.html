<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styling/index.css">
</head>

<body>

    <div id="loader">
        <video id="loader-bg-video" autoplay muted loop playsinline></video>
        <div class="loader-aurora">
            <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="lf1">
                        <feGaussianBlur stdDeviation="58" />
                    </filter>
                    <filter id="lf2">
                        <feGaussianBlur stdDeviation="72" />
                    </filter>
                    <filter id="lf3">
                        <feGaussianBlur stdDeviation="62" />
                    </filter>
                </defs>
            </svg>
        </div>
    </div>

    <div id="player">
        <video id="v" playsinline></video>

        <div id="title-bar"><span id="title-text"></span></div>

        <div id="tap-left" class="tap-zone"></div>
        <div id="tap-right" class="tap-zone"></div>

        <div id="skip-left" class="skip-pill">
            <div class="skip-inner">
                <i class="fa-solid fa-backward"></i>
                <span id="skip-left-lbl">-10 seconds</span>
            </div>
        </div>
        <div id="skip-right" class="skip-pill">
            <div class="skip-inner">
                <i class="fa-solid fa-forward"></i>
                <span id="skip-right-lbl">+10 seconds</span>
            </div>
        </div>

        <div id="center-flash"><i class="fa-solid fa-play" id="ci"></i></div>

        <div id="buffering-spinner">
            <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
                <circle cx="22" cy="22" r="18" />
            </svg>
        </div>

        <div id="player-controls-wrapper">
            <div id="progress-container">
                <div id="track-wrap">
                    <div id="tooltip">0:00</div>
                    <div id="track">
                        <div id="buf"></div>
                        <div id="prog"></div>
                        <div id="thumb"></div>
                    </div>
                </div>
                <div id="time-row">
                    <span id="t-cur">0:00</span>
                    <span id="t-dur">0:00</span>
                </div>
            </div>

            <div id="controls">
                <div id="control-row">
                    <button id="btn-play" class="ctrl-btn"><i class="fa-solid fa-play" id="play-ico"></i></button>
                    <div style="flex:1;"></div>
                    <div id="settings-btn-wrap">
                        <button id="btn-settings" class="ctrl-btn" title="Settings"><i
                                class="fa-solid fa-cog"></i></button>
                        <div id="settings-panel">
                            <div class="settings-menu-group">
                                <div class="settings-menu-header">
                                    <div class="smh-left"><i class="fa-solid fa-clock"></i> Playback</div>
                                    <div class="smh-right"><span class="smh-label" id="lbl-speed">Normal</span> <i
                                            class="fa-solid fa-chevron-right chevron"></i></div>
                                </div>
                                <div class="settings-menu-content">
                                    <div class="settings-content-inner">
                                        <div class="settings-list" id="speed-opts">
                                            <div class="settings-list-item" data-speed="0.25"><i
                                                    class="fa-regular fa-circle"></i> 0.25x</div>
                                            <div class="settings-list-item" data-speed="0.5"><i
                                                    class="fa-regular fa-circle"></i> 0.5x</div>
                                            <div class="settings-list-item" data-speed="0.75"><i
                                                    class="fa-regular fa-circle"></i> 0.75x</div>
                                            <div class="settings-list-item active" data-speed="1"><i
                                                    class="fa-regular fa-circle-dot"></i>
                                                Normal</div>
                                            <div class="settings-list-item" data-speed="1.25"><i
                                                    class="fa-regular fa-circle"></i> 1.25x</div>
                                            <div class="settings-list-item" data-speed="1.5"><i
                                                    class="fa-regular fa-circle"></i> 1.5x</div>
                                            <div class="settings-list-item" data-speed="1.75"><i
                                                    class="fa-regular fa-circle"></i> 1.75x</div>
                                            <div class="settings-list-item" data-speed="2"><i
                                                    class="fa-regular fa-circle"></i> 2x</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="settings-menu-group">
                                <div class="settings-menu-header">
                                    <div class="smh-left"><i class="fa-solid fa-sliders"></i> Quality</div>
                                    <div class="smh-right"><span class="smh-label" id="lbl-quality">Auto</span> <i
                                            class="fa-solid fa-chevron-right chevron"></i></div>
                                </div>
                                <div class="settings-menu-content">
                                    <div class="settings-content-inner">
                                        <div class="settings-list" id="quality-opts"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="settings-menu-group">
                                <div class="settings-menu-header">
                                    <div class="smh-left"><i class="fa-solid fa-closed-captioning"></i> Subtitles</div>
                                    <div class="smh-right"><span class="smh-label" id="lbl-subtitle">Off</span> <i
                                            class="fa-solid fa-chevron-right chevron"></i></div>
                                </div>
                                <div class="settings-menu-content">
                                    <div class="settings-content-inner">
                                        <div class="settings-list" id="subtitle-opts">
                                            <div class="settings-list-item active" data-track="-1"><i
                                                    class="fa-regular fa-circle-dot"></i> Off
                                            </div>
                                        </div>

                                        <div id="sub-customize" style="display:none;">
                                            <div class="sub-customize-title">Caption Style</div>
                                            <div class="settings-row">
                                                <span class="settings-row-label">Font</span>
                                                <div class="select-wrapper">
                                                    <select id="sub-font-select" class="settings-select">
                                                        <option value="sans">Sans-Serif</option>
                                                        <option value="serif">Serif</option>
                                                        <option value="mono">Monospace</option>
                                                    </select>
                                                    <i class="fa-solid fa-chevron-down"></i>
                                                </div>
                                            </div>
                                            <div class="settings-row">
                                                <span class="settings-row-label">Size</span>
                                                <div class="select-wrapper">
                                                    <select id="sub-size-select" class="settings-select">
                                                        <option value="small">Small</option>
                                                        <option value="medium">Medium</option>
                                                        <option value="large">Large</option>
                                                        <option value="xlarge">Extra Large</option>
                                                        <option value="xxlarge">Huge</option>
                                                    </select>
                                                    <i class="fa-solid fa-chevron-down"></i>
                                                </div>
                                            </div>
                                            <div class="settings-row">
                                                <span class="settings-row-label">Text Color</span>
                                                <div class="color-picker-wrapper">
                                                    <input type="color" id="sub-color-input" class="settings-color"
                                                        value="#ffffff">
                                                </div>
                                            </div>
                                            <div class="settings-row">
                                                <span class="settings-row-label">Background Color</span>
                                                <div class="color-picker-wrapper">
                                                    <input type="color" id="sub-bg-color-input" class="settings-color"
                                                        value="#000000">
                                                </div>
                                            </div>
                                            <div class="settings-row">
                                                <span class="settings-row-label">Background Opacity</span>
                                                <div class="select-wrapper">
                                                    <select id="sub-bg-opacity-select" class="settings-select">
                                                        <option value="0">0%</option>
                                                        <option value="0.25">25%</option>
                                                        <option value="0.5">50%</option>
                                                        <option value="0.75" selected>75%</option>
                                                        <option value="1">100%</option>
                                                    </select>
                                                    <i class="fa-solid fa-chevron-down"></i>
                                                </div>
                                            </div>
                                            <div class="settings-row">
                                                <span class="settings-row-label">Position</span>
                                                <div class="select-wrapper">
                                                    <select id="sub-pos-select" class="settings-select">
                                                        <option value="top">Top</option>
                                                        <option value="high">High</option>
                                                        <option value="mid">Mid</option>
                                                        <option value="low">Low</option>
                                                        <option value="bottom">Bottom</option>
                                                    </select>
                                                    <i class="fa-solid fa-chevron-down"></i>
                                                </div>
                                            </div>
                                            <div class="settings-row">
                                                <span class="settings-row-label">Edge Effect</span>
                                                <div class="select-wrapper">
                                                    <select id="sub-edge-select" class="settings-select">
                                                        <option value="shadow">Shadow</option>
                                                        <option value="outline">Outline</option>
                                                        <option value="uniform">Uniform</option>
                                                        <option value="none">None</option>
                                                    </select>
                                                    <i class="fa-solid fa-chevron-down"></i>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button id="btn-pip" class="ctrl-btn"><i class="fa-solid fa-window-restore"></i></button>
                    <button id="btn-fullscreen" class="ctrl-btn"><i class="fa-solid fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div id="error-screen">
            <div class="err-text">Source Not Found</div>
        </div>

        <div id="subtitle-display"><span id="subtitle-text"></span></div>
    </div>
    
    <div id="next-ep-btn" style="display:none;">
        <div id="next-ep-inner">
            <span id="next-ep-label">Next Episode</span>
            <i class="fa-solid fa-arrow-right"></i>
        </div>
    </div>

    <div id="now-playing-toast"></div>

    <script src="javascript/index.js"></script>
</body>
